<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engineering Masterclass | Complete Zero to Production</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-blue: #3b82f6;
            --accent-amber: #f59e0b;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-cyan: #06b6d4;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2d2d3a;
            --card-bg: #16161f;
            --gradient-1: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --gradient-2: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-tertiary: #e2e8f0;
            --accent-blue: #2563eb;
            --accent-amber: #d97706;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --card-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
        }

        code, pre {
            font-family: 'Fira Code', monospace;
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text h1 {
            font-size: 16px;
            color: var(--text-primary);
        }

        .logo-text span {
            font-size: 11px;
            color: var(--text-muted);
        }

        .search-box {
            margin-top: 15px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        /* Progress Bar */
        .progress-container {
            padding: 15px 20px;
            background: var(--bg-tertiary);
            margin: 15px 20px;
            border-radius: 10px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .progress-bar {
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* Track List */
        .track-list {
            padding: 10px 0;
        }

        .track-item {
            border-bottom: 1px solid var(--border-color);
        }

        .track-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .track-header:hover {
            background: var(--bg-tertiary);
        }

        .track-number {
            width: 32px;
            height: 32px;
            background: var(--bg-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: var(--accent-blue);
        }

        .track-number.completed {
            background: var(--accent-green);
            color: white;
        }

        .track-info {
            flex: 1;
        }

        .track-title {
            font-size: 14px;
            font-weight: 500;
        }

        .track-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .track-toggle {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .track-item.open .track-toggle {
            transform: rotate(90deg);
        }

        .track-subsections {
            display: none;
            padding: 0 20px 15px 64px;
        }

        .track-item.open .track-subsections {
            display: block;
        }

        .subsection {
            padding: 8px 0;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subsection:hover {
            color: var(--accent-blue);
        }

        .subsection.completed::before {
            content: "✓";
            color: var(--accent-green);
        }

        .subsection.current {
            color: var(--accent-blue);
            font-weight: 500;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 30px 50px;
            max-width: 1200px;
        }

        /* Top Bar */
        .top-bar {
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            padding: 15px 50px;
            margin: -30px -50px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--text-muted);
        }

        .breadcrumb a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .top-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        /* Content Sections */
        .content-section {
            margin-bottom: 60px;
        }

        .section-header {
            margin-bottom: 30px;
        }

        .section-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-blue);
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 36px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 700px;
        }

        /* Concept Cards */
        .concept-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .concept-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .concept-card.expanded {
            border-color: var(--accent-amber);
        }

        .concept-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .concept-icon {
            width: 50px;
            height: 50px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .concept-info {
            flex: 1;
        }

        .concept-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .concept-meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        .concept-expand {
            width: 30px;
            height: 30px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .concept-card.expanded .concept-expand {
            transform: rotate(180deg);
        }

        .concept-content {
            display: none;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .concept-card.expanded .concept-content {
            display: block;
        }

        /* Info Boxes */
        .info-box {
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
        }

        .info-box.definition {
            background: linear-gradient(135deg, rgba(59,130,246,0.1) 0%, rgba(139,92,246,0.1) 100%);
            border-left: 4px solid var(--accent-blue);
        }

        .info-box.analogy {
            background: linear-gradient(135deg, rgba(245,158,11,0.1) 0%, rgba(239,68,68,0.1) 100%);
            border-left: 4px solid var(--accent-amber);
        }

        .info-box.bfsi {
            background: linear-gradient(135deg, rgba(16,185,129,0.1) 0%, rgba(6,182,212,0.1) 100%);
            border-left: 4px solid var(--accent-green);
        }

        .info-box h4 {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-box p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Code Blocks */
        .code-block {
            background: var(--bg-tertiary);
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
        }

        .code-header {
            padding: 10px 15px;
            background: var(--bg-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .code-header span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .code-copy {
            padding: 4px 10px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }

        .code-block pre {
            padding: 20px;
            overflow-x: auto;
            margin: 0;
        }

        /* Diagrams */
        .diagram-container {
            background: var(--bg-tertiary);
            border-radius: 16px;
            padding: 30px;
            margin: 20px 0;
            text-align: center;
        }

        .diagram-container svg {
            max-width: 100%;
            height: auto;
        }

        /* Quiz Section */
        .quiz-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin: 30px 0;
        }

        .quiz-question {
            margin-bottom: 25px;
        }

        .quiz-question h4 {
            margin-bottom: 15px;
            font-size: 16px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            padding: 12px 15px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-option:hover {
            border-color: var(--accent-blue);
        }

        .quiz-option.correct {
            background: rgba(16,185,129,0.2);
            border-color: var(--accent-green);
        }

        .quiz-option.incorrect {
            background: rgba(239,68,68,0.2);
            border-color: var(--accent-red);
        }

        .quiz-result {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .quiz-result.show {
            display: block;
        }

        .quiz-result.success {
            background: rgba(16,185,129,0.1);
            color: var(--accent-green);
        }

        .quiz-result.error {
            background: rgba(239,68,68,0.1);
            color: var(--accent-red);
        }

        /* Navigation */
        .section-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
        }

        .nav-btn {
            padding: 12px 25px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        /* Bookmarks */
        .bookmark-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 100;
            transition: transform 0.2s;
        }

        .bookmark-btn:hover {
            transform: scale(1.1);
        }

        .bookmark-btn.active {
            background: var(--accent-amber);
        }

        /* Theme Toggle */
        .theme-toggle {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* Mobile Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .top-bar {
                padding: 15px 20px;
                margin: -20px -20px 20px;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-in {
            animation: fadeIn 0.5s ease forwards;
        }

        /* Interactive Diagrams */
        .interactive-diagram {
            position: relative;
            background: var(--bg-tertiary);
            border-radius: 16px;
            padding: 30px;
            margin: 25px 0;
        }

        .diagram-node {
            padding: 15px 25px;
            background: var(--card-bg);
            border: 2px solid var(--accent-blue);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .diagram-node:hover {
            background: var(--accent-blue);
            color: white;
        }

        .diagram-node.active {
            background: var(--accent-amber);
            border-color: var(--accent-amber);
        }

        .diagram-connector {
            width: 2px;
            height: 30px;
            background: var(--accent-blue);
            margin: 0 auto;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 40px;
            margin: 30px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -33px;
            top: 25px;
            width: 16px;
            height: 16px;
            background: var(--accent-blue);
            border-radius: 50%;
            border: 3px solid var(--bg-primary);
        }

        .timeline-year {
            font-size: 12px;
            color: var(--accent-blue);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .timeline-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .timeline-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Matrix/Tables */
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .comparison-table th,
        .comparison-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .comparison-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .comparison-table tr:hover {
            background: var(--bg-tertiary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Print Styles */
        @media print {
            .sidebar, .top-bar, .bookmark-btn, .section-nav {
                display: none;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🧠</div>
                    <div class="logo-text">
                        <h1>AI Engineering</h1>
                        <span>Masterclass</span>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="Search topics..." id="searchInput">
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-header">
                    <span>Overall Progress</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="track-list" id="trackList">
                <!-- Tracks will be populated by JS -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="breadcrumb">
                    <a href="#" onclick="showSection('home')">Home</a> →
                    <span id="currentBreadcrumb">Welcome</span>
                </div>
                <div class="top-actions">
                    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
                    <button class="btn btn-secondary" onclick="resetProgress()">Reset Progress</button>
                </div>
            </div>

            <div id="contentArea">
                <!-- Content will be populated by JS -->
            </div>
        </main>
    </div>

    <!-- Bookmark Button -->
    <div class="bookmark-btn" onclick="addBookmark()" title="Bookmark this section">📌</div>

    <script>
        // ==============================================================================
        // COURSE DATA
        // ==============================================================================

        const courseData = {
            tracks: [
                {
                    id: 'track1',

                        { id: '1-2', title: 'Mathematics for AI', time: '1.5 hours' },
                        { id: '1-3', title: 'Python for AI', time: '1 hour' },
                        { id: '1-4', title: 'Data Engineering for AI', time: '1 hour' }
                    ]
                },
                {
                    id: 'track2',
                    title: 'Classical Machine Learning',
                    subtitle: 'Traditional Algorithms',
                    icon: '📊',
                    color: '#8b5cf6',
                    time: '5-6 hours',
                    subsections: [
                        { id: '2-1', title: 'The ML Paradigm', time: '30 min' },
                        { id: '2-2', title: 'Core Algorithms', time: '2 hours' },
                        { id: '2-3', title: 'Bias-Variance Tradeoff', time: '45 min' },
                        { id: '2-4', title: 'Evaluation Metrics', time: '45 min' },
                        { id: '2-5', title: 'Scikit-learn in Practice', time: '1 hour' }
                    ]
                },
                {
                    id: 'track3',

                    color: '#f59e0b',
                    time: '6-8 hours',
                    subsections: [

                state.bookmarks = parsed.bookmarks || [];
                state.theme = parsed.theme || 'dark';

            applyTheme();

            localStorage.setItem('aiMasterclass', JSON.stringify({
                completedSections: Array.from(state.completedSections),

                theme: state.theme

        }

            document.documentElement.setAttribute('data-theme', state.theme);

            state.theme = state.theme === 'dark' ? 'light' : 'dark';

            saveState();

            const totalSubsections = courseData.tracks.reduce((sum, t) => sum + t.subsections.length, 0);
            const completed = state.completedSections.size;
            const percent = Math.round((completed / totalSubsections) * 100);

            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressPercent').textContent = `${percent}%`;
        }

        function markComplete(sectionId) {
            state.completedSections.add(sectionId);
            saveState();
            updateProgress();

        function getQuiz(sectionId) {
            return `
                <div class="quiz-section">
                    <h3 style="margin-bottom: 20px;">📝 Quick Quiz</h3>

                    <div class="quiz-question" id="quiz-1">
                        <h4>Q1: What is the main advantage of attention mechanisms over RNNs?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false)">
                                A) They use less memory
                            </div>
                            <div class="quiz-option" onclick="checkAnswer(this, true)">
                                B) They can parallelize computation and capture long-range dependencies
                            </div>
                            <div class="quiz-option" onclick="checkAnswer(this, false)">
                                C) They are faster to train
                            </div>
                            <div class="quiz-option" onclick="checkAnswer(this, false)">
                                D) They require less data
                            </div>
                        </div>
                        <div class="quiz-result">
                            <strong>Correct!</strong> Attention mechanisms enable parallel processing and can capture dependencies across arbitrary distances in the sequence.
                        </div>
                    </div>

                    <div class="quiz-question" id="quiz-2">
                        <h4>Q2: In a transformer, what does the "multi-head" in multi-head attention refer to?</h4>
                        <div class="quiz-options">
                            <div class="quiz-option" onclick="checkAnswer(this, false)">
                                A) Multiple transformer layers stacked together
                            </div>
                            <div class="quiz-option" onclick="checkAnswer(this, false)">
                                B) Processing multiple sequences at once
                            </div>
                            <div class="quiz-option" onclick="checkAnswer(this, true)">
                                C) Running multiple attention operations in parallel, each learning different aspects
                            </div>
                            <div class="quiz-option" onclick="checkAnswer(this, false)">
                                D) Using multiple different attention functions
                            </div>
                        </div>
                        <div class="quiz-result">
                            <strong>Correct!</strong> Multiple heads allow the model to attend to different aspects of the relationships simultaneously.
                        </div>
                    </div>
                </div>
            `;
        }

        function checkAnswer(element, isCorrect) {
            const parent = element.closest('.quiz-question');
            const options = parent.querySelectorAll('.quiz-option');
            const result = parent.querySelector('.quiz-result');

            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                opt.onclick = null;
            });

            if (isCorrect) {
                element.classList.add('correct');
                result.className = 'quiz-result show success';
                result.innerHTML = '<strong>✓ Correct!</strong> Great job understanding this concept.';
            } else {
                element.classList.add('incorrect');
                result.className = 'quiz-result show error';
                result.innerHTML = '<strong>✗ Not quite.</strong> Review the section and try again.';
            }
        }

        function copyCode(button) {
            const code = button.closest('.code-block').querySelector('code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                setTimeout(() => button.textContent = originalText, 2000);
            });
        }

        function showNext(currentId) {
            const allSections = courseData.tracks.flatMap(t => t.subsections.map(s => s.id));
            const currentIndex = allSections.indexOf(currentId);
            if (currentIndex < allSections.length - 1) {
                showSection(allSections[currentIndex + 1]);
            }
        }

        function showPrevious(currentId) {
            const allSections = courseData.tracks.flatMap(t => t.subsections.map(s => s.id));
            const currentIndex = allSections.indexOf(currentId);
            if (currentIndex > 0) {
                showSection(allSections[currentIndex - 1]);
            }
        }

        function addBookmark() {
            const btn = document.querySelector('.bookmark-btn');
            btn.classList.toggle('active');

            if (btn.classList.contains('active')) {
                if (!state.bookmarks.includes(state.currentSection)) {
                    state.bookmarks.push(state.currentSection);
                    saveState();
                    alert('Section bookmarked!');
                }
            }
        }

        // ==============================================================================
        // INITIALIZATION
        // ==============================================================================

        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            renderSidebar();
            updateProgress();
            showSection('home');

            // Mobile menu toggle
            document.querySelector('.sidebar-header').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });

            // Search functionality
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const subsections = document.querySelectorAll('.subsection');

                subsections.forEach(sub => {
                    const text = sub.textContent.toLowerCase();
                    sub.style.display = text.includes(query) ? 'flex' : 'none';
                });
            });
        });
    </script>
